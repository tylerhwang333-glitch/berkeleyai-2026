server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # CS2 .dem demos can be large (long matches exceed 300M); allow generous
    # uploads through the proxy.
    client_max_body_size 2G;

    # Proxy API + health checks to the backend container. "backend" is the
    # service name on the compose network.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Parsing a real full-match .dem + running the coach pipeline can take a
        # few minutes. Keep the upstream connection open well past that so a slow
        # (but successful) analysis isn't severed mid-flight and reported as 502.
        proxy_connect_timeout 60s;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location = /health {
        proxy_pass http://backend:8000/health;
    }

    # SPA fallback: serve index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
